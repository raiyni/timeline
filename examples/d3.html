<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8' />
    <title>Simple Bar chart</title>
    <script src="https://d3js.org/d3.v6.min.js" charset="utf-8"></script>
    <style>
        body {
            font-family: "Arial", sans-serif;
        }

        .bar {
            fill: #5f89ad;
        }

        .axis {
            font-size: 13px;
        }

        .axis path,
        .axis line {
            fill: none;
            display: none;
        }

        .label {
            font-size: 13px;
        }
    </style>

<style>
  rect {
    fill-opacity: 0.6;
  }

  .bg {
    fill-opacity: 0.3;
  }

  rect:not(.bg):hover {
    fill-opacity: 1;
  }
  .axis {
    font-size: smaller;
  }
</style>

</head>

<body>


  <script src='./d3.js'></script>
</body>

</html>
